[pytest]
# Pytest configuration for BedaanWaves backend
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: automatically treat async test functions as asyncio tests
asyncio_mode = auto

# Environment variables for tests (pytest-env)
env =
    ENVIRONMENT=testing
    DEBUG=false
    LOG_LEVEL=WARNING

addopts =
    -ra
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests for individual services
    integration: Integration tests across components
    slow: Tests that take a long time to run
